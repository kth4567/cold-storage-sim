<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>传热学知识点总览 · 数字冷库</title>
  <link rel="icon" href="data:," />
  <link rel="stylesheet" href="./kp.css" />
  <style>
    .hub-header { text-align: center; padding: 30px 0 8px; }
    .hub-header h1 { margin: 0; font-size: 36px; letter-spacing: 3px; }
    .hub-header p { color: var(--muted); max-width: 720px; margin: 14px auto 0; font-size: 19px; }
    .hub-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 16px;
      margin-top: 26px;
    }
    a.kp-card {
      display: block;
      padding: 20px 22px 18px;
      border: 1.5px solid var(--line);
      border-radius: 14px;
      background: var(--paper);
      color: var(--ink);
      text-decoration: none;
      position: relative;
      overflow: hidden;
      transition: all 0.18s;
      box-shadow: 0 2px 10px rgba(23, 41, 61, 0.05);
    }
    a.kp-card:hover {
      border-color: var(--cold);
      transform: translateY(-3px);
      box-shadow: 0 12px 28px rgba(22, 104, 184, 0.14);
    }
    a.kp-card .bignum {
      position: absolute;
      right: 10px;
      top: -12px;
      font-family: var(--mono);
      font-size: 92px;
      font-weight: 700;
      color: rgba(22, 104, 184, 0.08);
      pointer-events: none;
      user-select: none;
    }
    a.kp-card:hover .bignum { color: rgba(217, 79, 22, 0.12); }
    a.kp-card h2 { margin: 0 0 4px; font-size: 21px; }
    a.kp-card .part { font-size: 14.5px; color: var(--cold); font-weight: 700; }
    a.kp-card .brief { margin-top: 8px; font-size: 15.5px; color: var(--muted); line-height: 1.7; }
    a.kp-card .f { margin-top: 10px; font-family: var(--mono); font-size: 14px; color: #a34410; }
    .thread { margin-top: 16px; }
    .thread .chain {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      font-size: 15.5px;
    }
    .thread .chain a {
      padding: 6px 14px;
      border: 1.5px solid var(--line-strong);
      border-radius: 999px;
      color: var(--cold);
      font-weight: 600;
      text-decoration: none;
      background: var(--paper);
    }
    .thread .chain a:hover { background: var(--cold-soft); border-color: var(--cold); }
    .thread .chain .arrow { color: var(--hot); font-weight: 700; }
    .thread p { margin: 6px 0 14px; color: var(--muted); font-size: 15.5px; }
  </style>
</head>
<body>
  <div class="kp-wrap">
    <div class="hub-header">
      <h1>传热学知识点总览</h1>
      <p>冷库的每一个部位都是一堂传热课。11 个知识点,每页五节:物理图景 → 核心公式 → 互动实验 → 典型例题 → 误区小结。</p>
      <a class="kp-back" href="../index.html" style="display:inline-block;margin-top:16px">⟵ 回到冷库巡检</a>
    </div>

    <div class="hub-grid" id="grid"></div>

    <div class="panel" style="margin-top:28px">
      <h3>推荐串讲线索 <small>四条主线走完全部知识点</small></h3>
      <div id="threads"></div>
    </div>
  </div>

  <script type="module">
    import { KP_META, KP_BY_ID } from "./kp-meta.js";

    const grid = document.getElementById("grid");
    KP_META.forEach((k) => {
      const a = document.createElement("a");
      a.className = "kp-card";
      a.href = "./" + k.file;
      a.innerHTML = `
        <div class="bignum">${k.num}</div>
        <div class="part">${k.id} · ${k.part} · ${k.cat}</div>
        <h2>${k.title}</h2>
        <div class="brief">${k.brief}</div>
        <div class="f">${k.formula}</div>`;
      grid.appendChild(a);
    });

    const THREADS = [
      { name: "① 围护结构得热(稳态起步)", ids: ["KP01", "KP02", "KP03", "KP11"],
        note: "导热三形态:平壁 → 屋面辐射叠加 → 地板非稳态入门 → 圆筒曲面。" },
      { name: "② 对流三兄弟", ids: ["KP04", "KP06", "KP08"],
        note: "自然对流 → 强制对流 → 表面传热,用 Bi 数承接内外热阻。" },
      { name: "③ 货物降温主线(核心分叉)", ids: ["KP08", "KP09", "KP10"],
        note: "KP08 的 Bi 判据是岔路口:Bi>0.1 走 KP09 非稳态,Bi<0.1 走 KP10 集中参数。" },
      { name: "④ 蒸发器全景", ids: ["KP05", "KP06", "KP07", "KP11"],
        note: "换热器 → 风机强制对流 → 霜层衰减 → 盘管管道,构成蒸发器换热闭环。" },
    ];
    const tBox = document.getElementById("threads");
    THREADS.forEach((t) => {
      const div = document.createElement("div");
      div.className = "thread";
      const chain = t.ids
        .map((id) => `<a href="./${KP_BY_ID[id].file}">${id} ${KP_BY_ID[id].title}</a>`)
        .join('<span class="arrow">→</span>');
      div.innerHTML = `<div style="font-weight:700;font-size:17px;margin-bottom:6px">${t.name}</div>
        <div class="chain">${chain}</div><p>${t.note}</p>`;
      tBox.appendChild(div);
    });
  </script>
</body>
</html>
